name: CI/CD Portfolio Angular

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate build metadata asset
        run: |
          mkdir -p src/assets
          echo "{\"commit\":\"${{ github.sha }}\",\"shortCommit\":\"${GITHUB_SHA::7}\",\"run\":\"${{ github.run_id }}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > src/assets/build-info.json

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: app/dist/app/browser
          if-no-files-found: error

  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate build metadata asset
        run: |
          mkdir -p src/assets
          echo "{\"commit\":\"${{ github.sha }}\",\"shortCommit\":\"${GITHUB_SHA::7}\",\"run\":\"${{ github.run_id }}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > src/assets/build-info.json

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Debug artifact structure
        run: |
          echo "dist/app/browser root:"
          ls -la dist/app/browser || true
          echo "dist/app/browser/assets:"
          ls -la dist/app/browser/assets || true
          echo "dist/app/browser/assets/images:"
          ls -la dist/app/browser/assets/images || true

      - name: Ensure assets are present before deploy
        run: |
          test -f dist/app/browser/assets/images/logo-ay-hori-noir-creux.png
          test -f dist/app/browser/assets/images/photo-identite.jpg
          test -f dist/app/browser/assets/build-info.json

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via FTPS with retries
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          success=0
          for attempt in 1 2 3; do
            echo "FTPS deploy attempt ${attempt}"

            lftp -u "$HOSTINGER_FTP_USERNAME","$HOSTINGER_FTP_PASSWORD" "$HOSTINGER_FTP_SERVER" -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; set net:timeout 25; set net:max-retries 2; set net:reconnect-interval-base 5; set net:reconnect-interval-max 15; set cmd:fail-exit yes; mirror -R --delete --verbose dist/app/browser/ /public_html/portfolio/; bye" && success=1 || true

            if [ "$success" -eq 1 ]; then
              echo "FTPS deploy completed."
              break
            fi

            sleep 15
          done

          if [ "$success" -ne 1 ]; then
            echo "Deploy failed after 3 attempts."
            exit 1
          fi

      - name: Verify live site serves current commit (non-blocking)
        continue-on-error: true
        working-directory: .
        run: |
          ok=0
          for attempt in 1 2 3 4 5 6; do
            response=$(curl -fsSL -H "Cache-Control: no-cache" "https://portfolio.yaurel.com/assets/build-info.json?run=${{ github.run_id }}&attempt=${attempt}" || true)
            echo "Attempt ${attempt}: ${response}"

            if echo "$response" | grep -q "${{ github.sha }}"; then
              echo "Live site matches current commit."
              ok=1
              break
            fi

            sleep 5
          done

          if [ "$ok" -ne 1 ]; then
            echo "::warning::Live site did not confirm current commit in time."
          fi

      - name: Verify live image endpoint (non-blocking)
        continue-on-error: true
        working-directory: .
        run: |
          ok=0
          for attempt in 1 2 3 4 5 6; do
            image_headers=$(curl -sI -H "Cache-Control: no-cache" "https://portfolio.yaurel.com/assets/images/logo-ay-hori-noir-creux.png?run=${{ github.run_id }}&attempt=${attempt}")
            echo "$image_headers"

            if echo "$image_headers" | grep -qi "Content-Type: image/"; then
              ok=1
              break
            fi

            sleep 5
          done

          if [ "$ok" -ne 1 ]; then
            echo "::warning::Live image endpoint is not returning image content-type."
          fi
