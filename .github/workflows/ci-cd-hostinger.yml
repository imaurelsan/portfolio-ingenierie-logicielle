name: CI/CD Portfolio Angular

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate build metadata asset
        run: |
          mkdir -p src/assets
          echo "{\"commit\":\"${{ github.sha }}\",\"shortCommit\":\"${GITHUB_SHA::7}\",\"run\":\"${{ github.run_id }}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > src/assets/build-info.json

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: app/dist/app/browser
          if-no-files-found: error

  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: dist

      - name: Deploy via FTPS (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # Accès FTP configurés dans :
          # GitHub > Settings > Secrets and variables > Actions > New repository secret
          # Noms attendus: HOSTINGER_FTP_SERVER, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: dist/
          server-dir: /public_html/portfolio/
          state-name: .ftp-deploy-sync-state-main.json
          dangerous-clean-slate: false

      - name: Pause before retry
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 15

      - name: Deploy via FTPS (attempt 2 if needed)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: dist/
          server-dir: /public_html/portfolio/
          state-name: .ftp-deploy-sync-state-main.json
          dangerous-clean-slate: false

      - name: Fail if deployment attempts failed
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: |
          echo "Deploy failed after 2 attempts."
          exit 1

      - name: Verify live site serves current commit (non-blocking)
        run: |
          ok=0
          for attempt in 1 2 3 4 5 6; do
            response=$(curl -fsSL -H "Cache-Control: no-cache" "https://portfolio.yaurel.com/assets/build-info.json?run=${{ github.run_id }}&attempt=${attempt}" || true)
            echo "Attempt ${attempt}: ${response}"

            if echo "$response" | grep -q "${{ github.sha }}"; then
              echo "Live site matches current commit."
              ok=1
              break
            fi

            sleep 5
          done

          if [ "$ok" -ne 1 ]; then
            echo "::warning::Live site did not confirm current commit in time. Check build-info.json manually."
          fi

      - name: Verify live image endpoint (non-blocking)
        run: |
          image_headers=$(curl -sI -H "Cache-Control: no-cache" "https://portfolio.yaurel.com/assets/images/logo-ay-hori-noir-creux.png?run=${{ github.run_id }}")
          echo "$image_headers"
          if ! echo "$image_headers" | grep -qi "Content-Type: image/"; then
            echo "::warning::Live image endpoint is not returning an image content-type yet."
          fi
