<div class="app-shell">
  <header class="app-header">
    <a class="brand" routerLink="/" aria-label="Retour à l'accueil">
      <img src="assets/images/logo-ay-carre-bg-blanc.png" alt="Logo AY" />
      <div>
        <p class="brand__kicker">Portfolio</p>
        <p class="brand__title">Aurel YAHOUEDEOU</p>
      </div>
    </a>

    <nav class="main-nav" aria-label="Navigation principale">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <p>© {{ currentYear }} Aurel YAHOUEDEOU - Portfolio</p>
  </footer>
</div>
